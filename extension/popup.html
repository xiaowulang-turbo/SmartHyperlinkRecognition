<!DOCTYPE html>
<html lang="zh-CN">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title data-i18n="popup.title">智能超链接识别</title>
		<link rel="stylesheet" href="popup.css" />
	</head>
	<body>
		<div class="container">
			<div class="header">
				<button
					class="lang-toggle"
					id="langToggle"
					data-i18n-title="common.switchLang"
					title="切换语言"
				>
					EN
				</button>
				<button
					class="theme-toggle"
					id="themeToggle"
					data-i18n-title="common.switchTheme"
					title="切换主题"
				>
					<span class="icon-moon">🌙</span>
					<span class="icon-sun">☀️</span>
				</button>
				<h1 data-i18n="popup.title">智能超链接识别</h1>
				<p class="subtitle" data-i18n="popup.subtitle">
					Smart Text-to-Link Converter
				</p>
			</div>

			<div class="content">
				<div class="domain-section">
					<span class="domain-icon">🌐</span>
					<span class="domain-name" id="currentDomain">—</span>
				</div>

				<div class="toggle-section">
					<label class="switch">
						<input type="checkbox" id="siteToggle" />
						<span class="slider"></span>
					</label>
					<span class="toggle-label" id="statusText">未启用</span>
				</div>

				<div class="info" id="infoActive">
					<p data-i18n="popup.info.convert">
						🔗 自动将纯文本 URL 转换为可点击链接
					</p>
					<p data-i18n="popup.info.dynamic">
						⚡ 支持动态内容实时处理
					</p>
				</div>

				<div class="info hint-inactive" id="infoInactive" style="display: none">
					<p data-i18n="popup.hint.enable">
						💡 点击开关为当前网站启用链接转换
					</p>
				</div>

				<div class="info hint-inactive" id="infoUnsupported" style="display: none">
					<p data-i18n="popup.hint.unsupported">
						⚠️ 此页面不支持链接转换
					</p>
				</div>

				<div class="stats-grid" id="statsGrid">
					<div class="stat-card" id="linkCountCard">
						<span class="stat-number" id="linkCount">—</span>
						<span class="stat-label" data-i18n="popup.stats.converted">链接已转换</span>
					</div>
				</div>
			</div>

			<div class="footer">
				<button
					id="optionsBtn"
					class="btn"
					data-i18n="popup.btn.settings"
				>
					⚙️ 设置
				</button>
				<button
					id="refreshBtn"
					class="btn"
					data-i18n="popup.btn.refresh"
				>
					🔄 刷新页面
				</button>
			</div>
			<div class="version" id="versionText"></div>
		</div>

		<script src="i18n.js"></script>
		<script src="popup.js"></script>
	</body>
</html>
